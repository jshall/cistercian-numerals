<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="https://akosnikhazy.github.io/cistercian-numerals/img/icon.png">
    <title>Cistercian numeral clock</title>

    <style>
        body {
            background: black;
            color: lime;
            margin: auto;
            width: 90vw;
            min-height: 100dvh;
            display: flex;
            gap: 20px;
            flex-direction: column;
            justify-content: space-evenly;
        }

        .hidden {
            display: none;
        }

        line {
            fill: none;
            stroke-linecap: round;
            stroke-width: 3
        }

        :host(.u1) .u1,
        :host(.u2) .u2,
        :host(.u3) .u3,
        :host(.u4) .u4,
        :host(.u5) .u5,
        :host(.u6) .u6,
        :host(.u7) .u7,
        :host(.u8) .u8,
        :host(.u9) .u9,
        :host(.d1) .d1,
        :host(.d2) .d2,
        :host(.d3) .d3,
        :host(.d4) .d4,
        :host(.d5) .d5,
        :host(.d6) .d6,
        :host(.d7) .d7,
        :host(.d8) .d8,
        :host(.d9) .d9,
        :host(.c1) .c1,
        :host(.c2) .c2,
        :host(.c3) .c3,
        :host(.c4) .c4,
        :host(.c5) .c5,
        :host(.c6) .c6,
        :host(.c7) .c7,
        :host(.c8) .c8,
        :host(.c9) .c9,
        :host(.k1) .k1,
        :host(.k2) .k2,
        :host(.k3) .k3,
        :host(.k4) .k4,
        :host(.k5) .k5,
        :host(.k6) .k6,
        :host(.k7) .k7,
        :host(.k8) .k8,
        :host(.k9) .k9,
        :host(.neg) .neg,
        .all {
            stroke: currentColor;
            z-index: 100
        }
    </style>

    <base target="_blank">
</head>

<body>
    <svg viewBox="0 0 350 70">
        <use id="Y" href="#numeral" x="000" width="50" />
        <use id="M" href="#numeral" x="050" width="50" />
        <use id="D" href="#numeral" x="100" width="50" />
        <use id="H" href="#numeral" x="200" width="50" />
        <use id="I" href="#numeral" x="250" width="50" />
        <use id="S" href="#numeral" x="300" width="50" />
    </svg>
    <svg viewBox="0 0 150 70">
        <use id="YY" href="#numeral" x="000" width="50" />
        <use id="MD" href="#numeral" x="050" width="50" />
        <use id="HM" href="#numeral" x="100" width="50" />
        <use id="SS" href="#numeral" x="60.5" y="27" height="16" />
    </svg>

    <svg id="symbols" class="hidden">
        <symbol id="numeral" viewBox="0 0 50 70">
            <line x1="25" y1="05" x2="05" y2="05" class="d1 d5 d7 d9" />
            <line x1="25" y1="25" x2="05" y2="25" class="d2 d8 d9" />
            <line x1="25" y1="05" x2="05" y2="25" class="d3" />
            <line x1="25" y1="25" x2="05" y2="05" class="d4 d5" />
            <line x1="05" y1="05" x2="05" y2="25" class="d6 d7 d8 d9" />

            <line x1="25" y1="05" x2="45" y2="05" class="u1 u5 u7 u9" />
            <line x1="25" y1="25" x2="45" y2="25" class="u2 u8 u9" />
            <line x1="25" y1="05" x2="45" y2="25" class="u3" />
            <line x1="25" y1="25" x2="45" y2="05" class="u4 u5" />
            <line x1="45" y1="05" x2="45" y2="25" class="u6 u7 u8 u9" />

            <line x1="25" y1="05" x2="25" y2="65" class="all" />
            <line x1="15" y1="35" x2="35" y2="35" class="neg" />

            <line x1="25" y1="65" x2="05" y2="65" class="k1 k5 k7 k9" />
            <line x1="25" y1="45" x2="05" y2="45" class="k2 k8 k9" />
            <line x1="25" y1="65" x2="05" y2="45" class="k3" />
            <line x1="25" y1="45" x2="05" y2="65" class="k4 k5" />
            <line x1="05" y1="65" x2="05" y2="45" class="k6 k7 k8 k9" />

            <line x1="25" y1="65" x2="45" y2="65" class="c1 c5 c7 c9" />
            <line x1="25" y1="45" x2="45" y2="45" class="c2 c8 c9" />
            <line x1="25" y1="65" x2="45" y2="45" class="c3" />
            <line x1="25" y1="45" x2="45" y2="65" class="c4 c5" />
            <line x1="45" y1="65" x2="45" y2="45" class="c6 c7 c8 c9" />
        </symbol>
    </svg>

    <script>
        "use strict"
        function setValue(id, value) {
            const names = [];
            if (value < 0) {
                names.push('neg');
                value = Math.abs(value);
            }
            names.push(`k${Math.trunc(value % 10000 / 1000)}`);
            names.push(`c${Math.trunc(value % 1000 / 100)}`);
            names.push(`d${Math.trunc(value % 100 / 10)}`);
            names.push(`u${Math.trunc(value % 10 / 1)}`);
            document.getElementById(id).className.baseVal = names.join(' ');
        }

        const updateClock = () => {
            let currentTime = new Date()
            setValue("Y", currentTime.getFullYear());
            setValue("M", currentTime.getMonth() + 1);
            setValue("D", currentTime.getDate());
            setValue("H", currentTime.getHours());
            setValue("I", currentTime.getMinutes());
            setValue("S", currentTime.getSeconds());
            setValue("YY", currentTime.getFullYear());
            setValue("MD", (currentTime.getMonth() + 1) * 100 + currentTime.getDate());
            setValue("HM", currentTime.getHours() * 100 + currentTime.getMinutes());
            setValue("SS", currentTime.getSeconds());
        };
        const timer = setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>

</html>
